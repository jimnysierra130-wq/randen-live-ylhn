<!DOCTYPE html><html lang="ja"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=3">
<meta name="robots" content="noindex,nofollow">
<title>運転士表 Watch</title>
<style>
:root{--bg:#000;--fg:#fff;--sub:#9aa4ac;--hon:#0a84ff;--kita:#ff9f0a;--card:#2a2e34;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);font-family:-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;}
body{padding:0 6px 18px;font-size:15px;line-height:1.25;}
#hdr{position:relative;z-index:40;background:var(--bg);border-bottom:1px solid #2b3138;display:flex;justify-content:space-between;align-items:baseline;gap:8px;padding:1px 8px 4px;line-height:1.05;will-change:transform;}
#hdr>span{padding:0;}
#clk{font-size:20px;font-weight:700;color:#eef2f5;font-variant-numeric:tabular-nums;white-space:nowrap;}
#stabtn{display:flex;align-items:center;gap:6px;width:100%;background:var(--card);border:1.5px solid #2b3947;border-radius:12px;padding:9px 11px;margin-bottom:5px;}
#stabtn .ic{font-size:17px;}
#sta{font-size:21px;font-weight:800;color:#fff;flex:1;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#stabtn .chg{font-size:12px;font-weight:800;color:#0a84ff;white-space:nowrap;}
#dch{font-size:20px;font-weight:700;color:#eef2f5;white-space:nowrap;}
#tabs{display:flex;gap:5px;margin:0 0 6px;}
#tabs button{flex:1 1 0;font-size:15px;font-weight:800;padding:9px 0;border:0;border-radius:10px;background:var(--card);color:var(--sub);}
#tabs button.on{background:var(--fg);color:#000;}
.row{display:flex;align-items:center;gap:7px;padding:8px 8px;border-radius:10px;background:var(--card);margin-bottom:5px;}
.row.past{opacity:.5;}
.rt{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums;min-width:2.9em;}
.rmid{flex:1 1 auto;min-width:0;}
.rd{font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rs{font-size:13px;color:var(--sub);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.drow .rd{font-size:13px;font-weight:600;}
.drow .rs{font-size:17px;font-weight:700;color:var(--fg);margin-top:2px;}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle;}
.bH{background:var(--hon);}.bK{background:var(--kita);}
.car{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;background:#7c3aed;color:#fff;border-radius:7px;padding:3px 7px;white-space:nowrap;cursor:pointer;}
.car.split{background:#0f2a1e;color:#bff5da;}
.sys{font-size:20px;font-weight:900;min-width:2.4em;text-align:center;border-radius:8px;padding:7px 0;}
.sys.h{background:rgba(10,132,255,.18);color:var(--hon);}.sys.k{background:rgba(255,159,10,.18);color:var(--kita);}
.pos{font-size:13px;color:var(--sub);margin-top:2px;}
.run{color:#30d158;font-weight:700;}
.empty{color:var(--sub);text-align:center;padding:22px 8px;font-size:14px;}
.mtitle{font-size:18px;font-weight:800;margin:10px 2px 5px;}
.mtitle.h{color:var(--hon);}.mtitle.k{color:var(--kita);}
.mlad{border-left:4px solid #333;margin:0 0 12px 11px;}
.mlad.h{border-left-color:var(--hon);}.mlad.k{border-left-color:var(--kita);}
.mstn{display:flex;align-items:flex-start;gap:8px;margin-left:-9px;padding:4px 0;}
.mdot{width:12px;height:12px;border-radius:50%;background:#555;flex:0 0 auto;margin-top:3px;}
.mlad.h .mdot{background:var(--hon);}.mlad.k .mdot{background:var(--kita);}
.mlbl{font-size:17px;color:#c8ced4;font-weight:600;margin-top:1px;white-space:nowrap;}
.mside{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px;}
.mside .mtr{margin:0;}
.mtr{display:flex;flex-wrap:wrap;align-items:center;gap:6px;background:var(--card);border:1px solid #3f454d;border-radius:10px;padding:8px 9px;margin:4px 0 4px 18px;}
.mtr .mdir{font-size:21px;font-weight:900;line-height:1;min-width:0.85em;text-align:center;}
.mtr .mdir.h{color:var(--hon);}.mtr .mdir.k{color:var(--kita);}
.mtr .mdir.st{font-size:16px;font-weight:900;color:#ff453a;white-space:nowrap;}
.mtr .mdir.st.rest{color:#ffd60a;}
.mtr .mdir.ks{color:#e24b4a;}
.mtr .mdir.st .mda{font-size:17px;margin-right:2px;vertical-align:-1px;}
.mtr .mdir.st .mda.h{color:var(--hon);}.mtr .mdir.st .mda.k{color:var(--kita);}
.mtr .mtag.ks{color:#e24b4a;}
.mtr .mkbh{font-size:15px;font-weight:800;background:#3a2f1a;color:#ffcf70;border-radius:6px;padding:2px 8px;}.mdep{font-size:15px;font-weight:800;background:#ffca28;color:#3a2600;border-radius:6px;padding:2px 8px;}.mwt2{font-size:14px;color:#9aa4ac;font-weight:700;}
.mtr .msys{font-size:19px;font-weight:900;border-radius:7px;padding:3px 9px;}
.mtr .msys.h{background:rgba(10,132,255,.18);color:var(--hon);}
.mtr .msys.k{background:rgba(255,159,10,.18);color:var(--kita);}
.mtr .mnm{font-size:21px;font-weight:500;color:#fff;}
.mtr .mnm.vac{color:#8a939b;}
.mtr .msys.vac{background:#2b3138;color:#9aa5ad;}
.mtr .mcar{font-size:16px;font-weight:800;background:#7c3aed;color:#fff;border-radius:8px;padding:2px 8px;font-variant-numeric:tabular-nums;}.mtr .mcartop{flex-basis:100%;display:flex;align-items:center;margin-bottom:1px;}
.mtr .mcar.split{background:#6d28d9;color:#fff;}
.mtr .mtag{font-size:13px;color:#9aa4ac;font-weight:700;}
.mtr .mbin{flex-basis:100%;font-size:13px;color:#c8ced4;font-weight:700;}
.mtr .mloc{font-size:14px;color:#9aa4ac;font-weight:700;}
.mtr .mrt{flex-basis:100%;font-size:13px;color:#ffd60a;font-weight:700;}
.msec{background:#0e0f11;border:1px solid #23262b;border-radius:12px;padding:5px 8px 7px;margin:6px 0;}
.msectitle{font-size:14px;font-weight:800;color:#c8ced4;margin:2px 2px 4px;}
.msec .mtr{margin:4px 0;}
.mtr .mcar{cursor:pointer;}
.vptitle{font-size:15px;font-weight:800;color:#c8ced4;margin:2px 2px 8px;}
.vpcar{background:#141414;border-radius:10px;padding:9px 11px;margin:0 0 8px;}
.vpnum{font-size:20px;font-weight:900;color:#c4b5fd;}
.vpser{font-size:16px;font-weight:700;color:#fff;margin-top:3px;}
.vpd{font-size:13px;color:#9aa4ac;margin-top:5px;line-height:1.5;}
.vpcap{font-size:16px;color:#c8ced4;margin-top:3px;}
.vpline{font-size:16px;color:#e6eaee;margin-top:7px;line-height:1.5;}
.vpk{display:inline-block;margin-right:7px;padding:1px 7px;border-radius:6px;background:#3a2f5c;color:#c4b5fd;font-size:16px;font-weight:800;}
.vphist{margin-top:9px;border-top:1px dashed #3a3550;padding-top:8px;}
.vphk{font-size:16px;font-weight:800;color:#c4b5fd;margin-bottom:5px;}
.vphrow{display:flex;gap:8px;font-size:16px;color:#e6eaee;line-height:1.5;margin-top:4px;}
.vphym{flex:0 0 auto;color:#9aa4ac;font-weight:700;}
.vphc{min-width:0;}
.vpcredit{font-size:11px;color:#6b727b;line-height:1.5;margin-top:10px;}
.mtr .msub{flex-basis:100%;font-size:14px;color:#aab2ba;}
.ov{display:none;background:var(--bg);padding:calc(env(safe-area-inset-top, 0px) + 12px) 2px 20px;box-sizing:border-box;min-height:100vh;flex-direction:column;}
#detailbody{margin:auto 0;width:100%;box-sizing:border-box;}
html.ovopen,body.ovopen{overflow:hidden;}
.ovtop{position:sticky;top:0;background:rgba(0,0,0,.97);padding:2px 0 8px;}
.ovx{font-size:19px;font-weight:800;padding:16px 12px;border:0;border-radius:14px;background:#c0392b;color:#fff;width:100%;box-sizing:border-box;}
.ovbot{margin-top:14px;}
#pick h3{font-size:13px;margin:2px 2px 6px;font-weight:800;text-align:center;}
#pick .pcols{display:grid;grid-template-columns:1fr 1fr;gap:6px;align-items:start;}
#pick .pcol{display:flex;flex-direction:column;gap:6px;}
#pick .pcol.hon h3{color:var(--hon);}
#pick .pcol.kita h3{color:var(--kita);}
#pick .pcol button{font-size:16px;font-weight:800;padding:14px 6px;border:0;border-top:3px solid transparent;border-radius:11px;background:var(--card);color:var(--fg);min-height:52px;text-align:center;line-height:1.15;}
#pick .pcol.hon button{border-top-color:var(--hon);}
#pick .pcol.kita button{border-top-color:var(--kita);}
.dseg{display:flex;gap:6px;background:var(--card);border-radius:8px;padding:5px 7px;margin-bottom:4px;}
.dseg .dt{font-size:13px;font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap;min-width:3.4em;}
.dseg .dx{flex:1;font-size:12px;color:#fff;min-width:0;}
#ft{font-size:10px;color:#555;text-align:center;margin-top:8px;}
.wbinj{background:#ffe0b2;color:#e65100;border-radius:4px;padding:0 4px;font-weight:800;}
.wcd{font-variant-numeric:tabular-nums;}
</style></head><body>

function _lineOrder(){var hon=[],kit=[];for(var i=0;i<ORDER.length;i++){if(ORDER[i][1]===0)hon.push(ORDER[i][0]);else kit.push(ORDER[i][0]);}kit.push('katabira');return {hon:hon,kit:kit};}
function trainSeg(sys,d,sec){var rt=ROUTE[d]&&ROUTE[d][sys];if(!rt||!rt.legs)return null;var legs=rt.legs;
  for(var k=0;k<legs.length;k++){var lg=legs[k];if(!lg.sp||lg.sp.length<1)continue;if(lg.os==null||sec<lg.os||sec>lg.es+90)continue;
    var sp=lg.sp,ln=(lg.line==='北野線'?'北野':'本線');
    for(var j=0;j<sp.length;j++){var a=sp[j][1],dp=sp[j][2];
      if(a!=null&&dp!=null&&sec>=a&&sec<=dp)return {line:ln,at:sp[j][0],dir:lg.dir,type:lg.type,kb:(lg.cpl?lg.koubu:''),host:(lg.type==='便乗'?(lg.host||''):''),rear:(lg.cpl?(lg.rear||''):'')};
      if(dp!=null&&j+1<sp.length){var na=sp[j+1][1];if(sec>=dp&&(na==null||sec<na))return {line:ln,from:sp[j][0],to:sp[j+1][0],dir:lg.dir,type:lg.type,kb:(lg.cpl?lg.koubu:''),host:(lg.type==='便乗'?(lg.host||''):''),rear:(lg.cpl?(lg.rear||''):'')};}}
    var _lz=sp[sp.length-1];if(_lz[1]!=null&&sec>=_lz[1])return {line:ln,at:_lz[0],dir:lg.dir,type:lg.type,kb:(lg.cpl?lg.koubu:''),host:(lg.type==='便乗'?(lg.host||''):''),rear:(lg.cpl?(lg.rear||''):'')};
    return {line:ln,from:lg.o,to:lg.d,dir:lg.dir,type:lg.type,kb:(lg.cpl?lg.koubu:''),host:(lg.type==='便乗'?(lg.host||''):''),rear:(lg.cpl?(lg.rear||''):'')};}
  return null;}
function renderMap(){
  var d=dia(),du=duty(),sec=_opSec(),nm=_opMin(),ord=_lineOrder();
  var honN=ord.hon.map(function(k){return NAME[k];}),kitN=ord.kit.map(function(k){return NAME[k];});
  var honB={},kitB={},any=false,recs=[],bySys={};
  for(var s in du){if(!du.hasOwnProperty(s))continue;var _nm=(''+du[s]).replace('①','1').replace('②','2').replace('③','3');if(!_nm)continue;var _vac=!isReal(_nm);
    var p=sysPos(s,d,nm);if(!p||p.st==='before'||p.st==='off'||p.st==='predep'||p.st==='chukyu')continue;
    var seg=trainSeg(s,d,sec),tr=sysTr(s,d,nm),c=car(tr),hn,anchor,ind,typ='営業',kb='',host='',rear='',da='',rtime='',shk=0;
    if(seg){hn=(seg.line==='北野');kb=seg.kb||'';typ=seg.type||'営業';host=seg.host||'';rear=seg.rear||'';var nms=hn?kitN:honN;
      if(seg.at){anchor=seg.at;ind='停';da=(seg.dir==='上り')?'▲':'▼';}
      else{var fi=nms.indexOf(seg.from),ti=nms.indexOf(seg.to);ind=(ti>fi)?'▼':'▲';anchor=(fi<ti)?seg.from:seg.to;}}
    else if(p.st==='run'&&p.o){hn=(p.line==='北野');var nmz=hn?kitN:honN,fz=nmz.indexOf(p.o),tz=nmz.indexOf(p.d);ind=(tz>fz)?'▼':'▲';anchor=p.o;}
    else if(p.st==='stop'||p.st==='rest'){hn=(p.line==='北野');kb=p.kb||'';anchor=(p.st==='rest')?(''+p.text).split(/ (?:休憩|出庫点検中)/)[0]:p.text;ind=(p.st==='rest')?'休':'停';da=(p.dir==='上り')?'▲':'▼';rtime=(p.st==='rest')?(p.rtime||''):'';shk=(p.st==='rest'&&p.shk)?1:0;}
    else continue;
    var r={sys:s,car:c,name:_nm,hn:hn,anchor:anchor,ind:ind,typ:typ,kb:kb,host:host,rear:rear,riders:null,vac:_vac,da:da,rtime:rtime,shk:shk,depban:(p.depban||''),wait:(p.wait||0),deptime:(p.deptime||'')};
    recs.push(r);bySys[s]=r;}
  var merged={},_i;
  for(_i=0;_i<recs.length;_i++){var R=recs[_i];if(R.host&&bySys[R.host]){(bySys[R.host].riders=bySys[R.host].riders||[]).push({sys:R.sys,name:R.name});merged[R.sys]=1;}}
  for(_i=0;_i<recs.length;_i++){var R2=recs[_i];if(R2.rear&&bySys[R2.rear]&&!merged[R2.rear])merged[R2.rear]=1;}
  var restList=[],botList=[],waitList=[];
  for(_i=0;_i<recs.length;_i++){var R3=recs[_i];if(merged[R3.sys])continue;any=true;var sn=parseInt(R3.sys,10);
    if(sn>=25&&sn<=27&&!(R3.typ==='営業'&&!R3.hn&&!!R3.anchor)){R3.showLoc=1;R3.noTap=1;botList.push(R3);}else if(R3.ind==='休'){R3.showLoc=1;restList.push(R3);}else if(R3.wait){R3.showLoc=1;waitList.push(R3);}else{var bk=R3.hn?kitB:honB;(bk[R3.anchor]=bk[R3.anchor]||[]).push(R3);}}
  for(var _z=25;_z<=27;_z++){var _zs=''+_z;if(du[_zs]&&!bySys[_zs]){var _zn=(''+du[_zs]).replace('①','1').replace('②','2').replace('③','3');botList.push({sys:_zs,name:_zn,hn:false,ind:'',da:'',kb:'',typ:'営業',host:'',rear:'',riders:null,vac:!isReal(_zn),anchor:'',showLoc:0,noTap:1});}}
  botList.sort(function(a,b){return parseInt(a.sys,10)-parseInt(b.sys,10);});
  var note=any?'':'<div class="empty" style="padding:8px 8px 2px;">現在、運行中の電車はありません（路線図のみ表示）</div>';
  function chipHtml(t){var isk=(t.typ==='回送'),run=(t.ind==='▲'||t.ind==='▼'),ic=run?(isk?'ks':(t.hn?'k':'h')):'st';
    var _rt='',_rl=(t.shk?'出庫点検中':'休憩');if(t.rtime){var _ee=(''+t.rtime).split('〜')[1];if(_ee){var _ep=_ee.split(':'),_em=(+_ep[0])*60+(+_ep[1]),_lf=_em-nm;_rt='<span class="mrt">'+_rl+' '+t.rtime+'（あと'+(_lf<=0?0:_lf)+'分）</span>';}else{_rt='<span class="mrt">'+_rl+' '+t.rtime+'</span>';}}
    var dind=!t.ind?'':(run?('<span class="mdir '+ic+'">'+t.ind+'</span>'):('<span class="mdir st'+(t.ind==='休'?' rest':'')+'">'+(t.da?'<span class="mda '+(t.hn?'k':'h')+'">'+t.da+'</span>':'')+(t.shk?'点':t.ind)+'</span>'));
    var tag=(t.typ&&t.typ!=='営業')?'<span class="mtag'+(isk?' ks':'')+'">('+t.typ+')</span>':'';
    var rid=(t.riders&&t.riders.length)?t.riders.map(function(r){return '<span class="mbin">＋便'+r.sys+' '+r.name+'</span>';}).join(''):'';
    return '<div class="mtr'+(t.vac?' vac':'')+(t.noTap?' notap':'')+'"'+(t.noTap?'':' onclick="popSys(\''+t.sys+'\')"')+'>'+dind+(t.car?((t.car.indexOf('+')>=0)?('<span class="mcartop"><span class="mcar split"'+(t.noTap?'':' onclick="event.stopPropagation();openVeh(\''+t.car+'\')"')+'>'+t.car+'</span></span>'):('<span class="mcar"'+(t.noTap?'':' onclick="event.stopPropagation();openVeh(\''+t.car+'\')"')+'>'+t.car+'</span>')):'')+'<span class="msys '+(t.hn?'k':'h')+'">'+t.sys+'</span><span class="mnm'+(t.vac?' vac':'')+'">'+t.name+'</span>'+tag+(t.kb?'<span class="mkbh">＋後部'+t.kb+'</span>':'')+(t.depban?'<span class="mdep">'+t.depban+'番線発</span>':'')+(t.wait&&t.deptime?'<span class="mwt2">'+t.deptime+'発</span>':'')+(t.showLoc&&t.anchor?'<span class="mloc">'+t.anchor+'</span>':'')+_rt+rid+'</div>';}
  function ladder(arr,bk,cls,title){var h='<div class="mtitle '+cls+'">'+title+'</div><div class="mlad '+cls+'">';
    for(var i=0;i<arr.length;i++){var nmS=NAME[arr[i]];var b=bk[nmS]||[],sd='',bl='';
      for(var j=0;j<b.length;j++){var c=b[j],_sp=(c.ind==='停'||c.ind==='休');
        if(_sp)sd+=chipHtml(c);else bl+=chipHtml(c);}
      h+='<div class="mstn"><span class="mdot"></span><span class="mlbl">'+nmS+'</span>'+(sd?'<span class="mside">'+sd+'</span>':'')+'</div>'+bl;}
    return h+'</div>';}
  function section(list,title){if(!list.length)return '';var _h='<div class="msec"><div class="msectitle">'+title+'</div>';for(var _q=0;_q<list.length;_q++)_h+=chipHtml(list[_q]);return _h+'</div>';}
  return note+ladder(ord.hon,honB,'h','本線')+ladder(ord.kit,kitB,'k','北野線')+section(waitList,'次 帷子発')+section(restList,'休憩')+section(botList,'25〜27勤務');
}
function ovOpen(){var p=document.getElementById('pick'),d=document.getElementById('detail');return (p&&p.style.display==='block')||(d&&d.style.display==='flex');}

  if(ovOpen())return;

function openPick(){var b=document.getElementById('pickbody');if(!b.innerHTML){var hon='',kita='';
  for(var i=0;i<ORDER.length;i++){var k=ORDER[i][0],ln=ORDER[i][1];var btn='<button onclick="pickSta(\''+k+'\')">'+NAME[k]+'</button>';if(ln===0)hon+=btn;else kita+=btn;}

function nearest(la,lo){var best=null,bd=1e18;for(var k in GEO){if(!GEO.hasOwnProperty(k))continue;var g=GEO[k];
  var dx=(la-g[0])*111132,dy=(lo-g[1])*111320*Math.cos(la*Math.PI/180),d=Math.sqrt(dx*dx+dy*dy);
  var cap=(k==='satsueijo')?70:1e18;if(d>cap)continue;if(d<bd){bd=d;best=k;}}return {k:best,d:bd};}
function doGeo(hide){needScroll=true;
  if(!navigator.geolocation||location.protocol==='file:'){if(hide)document.getElementById('pick').style.display='none';render();return;}
  navigator.geolocation.getCurrentPosition(function(p){var r=nearest(p.coords.latitude,p.coords.longitude);
    if(r.k&&r.d<=900){curSta=r.k;saveSta(r.k);}if(hide)document.getElementById('pick').style.display='none';render();},
    function(){if(hide)document.getElementById('pick').style.display='none';render();},
    {enableHighAccuracy:true,timeout:10000,maximumAge:0});
}

_syncHdr();setTimeout(_syncHdr,60);setTimeout(_syncHdr,300);window.addEventListener('resize',_syncHdr);
var _lastBeat=Date.now(),_beatIv=null,_renderIv=null;
function _beat(){_lastBeat=Date.now();var _cj=jstNow(),_ce=document.getElementById('clk');if(_ce)_ce.textContent=_cj.getHours()+':'+pad(_cj.getMinutes())+':'+pad(_cj.getSeconds());var _wc=document.querySelectorAll('.wcd');for(var _wi=0;_wi<_wc.length;_wi++){var _wd=+_wc[_wi].getAttribute('data-dep');var _wr=_wd-_opSec();if(_wr<0)_wr=0;_wc[_wi].textContent='あと'+Math.floor(_wr/60)+'分'+('0'+(_wr%60)).slice(-2)+'秒';}}

/* スリープ復帰(腕上げ)で自動再開：クロック秒とマップを即再同期し、止まったタイマーを作り直す */
function _wake(){try{_beat();render();}catch(e){}_startTimers();}
_startTimers();

/* 画面ONで復帰イベントが来ない機種向け：タッチ/クラウン(ホイール)を触れたら停止から自動再開 */
