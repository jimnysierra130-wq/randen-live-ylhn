  h+='</div>';
  var _us=e.urls||(e.url?[['お客様向け公式ページ',e.url]]:[]);if(_us.length)h+='<div class="custw">'+_us.map(function(u){return '<a class="cust" href="'+esc(u[1])+'" target="_blank" rel="noopener">🔗 '+esc(u[0])+'</a>';}).join('')+'</div>';
  if(e.points&&e.points.length){h+='<ul class="pt">';e.points.forEach(function(p){h+='<li>'+esc(p)+'</li>';});h+='</ul>';}
  if(e.cautions&&e.cautions.length){h+='<div class="cau">';e.cautions.forEach(function(c){h+='<div>'+esc(c)+'</div>';});h+='</div>';}
  if(e.details&&e.details.length){h+='<details open><summary>▼ 詳細一覧</summary><table class="dtb">';e.details.forEach(function(r){h+='<tr><td>'+esc(r[0])+'</td><td>'+esc(r[1])+'</td></tr>';});h+='</table></details>';}
  if(e.pending_note)h+='<div class="endnote">⏳ '+esc(e.pending_note)+'</div>';
  if(st.k==='fin'&&e.ended_note)h+='<div class="endnote">▶ '+esc(e.ended_note)+'</div>';
 h+=srcHtml(e);
 h+='</div></div>';
 return h;
}
var CUR='all';
function render(){
 var today=jnow();document.getElementById('today').textContent=fmtdy(today);
 var q=(document.getElementById('q').value||'').trim().toLowerCase();
 var act=[],fin=[];
 EV.forEach(function(e){
  if(CUR!=='all'&&CUR!=='fin'&&e.cat!==CUR)return;
  if(q){var blob=(e.title+' '+(e.place||'')+' '+(e.price||'')+' '+(e.how||'')+' '+(e.points||[]).join(' ')+' '+(e.cautions||[]).join(' ')+' '+(e.details||[]).map(function(r){return r.join(' ');}).join(' ')).toLowerCase();if(blob.indexOf(q)<0)return;}
  var st=stOf(e,today);
  if(st.k==='fin')fin.push([e,st]);else act.push([e,st]);
 });
 act.sort(function(a,b){var sa=a[0].start||'0000',sb=b[0].start||'0000';if(sa!==sb)return sa>sb?-1:1;var ea=a[0].end||'9999',eb=b[0].end||'9999';return ea<eb?-1:1;});
 fin.sort(function(a,b){var ea=a[0].end||'',eb=b[0].end||'';return ea>eb?-1:1;});
 var h='';
 var _all=act.concat(fin);
 if(_all.length>1){h+='<div class="ovw">'+_all.map(function(x){var e=x[0],st=x[1];return '<button class="ovt s-'+st.k+'" data-jump="'+e.id+'"><span class="d"></span><span class="tx">'+CATI[e.cat]+' '+esc(e.title)+'</span></button>';}).join('')+'</div>';}
 if(CUR!=='fin'){
  h+='<div class="sec">🟢 進行中・発売中 <span class="n">'+act.length+'</span><span class="s">最新順（開始日の新しい順）</span></div>';
  if(!act.length)h+='<div id="none">該当なし</div>';
  h+='<div class="cards">'+act.map(function(x){return card(x[0],x[1],today);}).join('')+'</div>';
 }
 if(fin.length){
  h+='<div class="sec">⚪ 終了済み <span class="n">'+fin.length+'</span><span class="s">新しい順・履歴として保持</span></div>';
  h+='<div class="cards">'+fin.map(function(x){return card(x[0],x[1],today);}).join('')+'</div>';
 }else if(CUR==='fin'&&!fin.length){h+='<div id="none">該当なし</div>';}
 document.getElementById('bd').innerHTML=h;
}
var chips=[['all','すべて'],['event','🎉 イベント'],['ticket','🎫 企画きっぷ'],['regular','🚋 常設・運賃'],['goods','🧸 グッズ'],['joho','📢 窓口共通'],['fin','⚪ 終了済み']];
var ch=document.getElementById('chips');
chips.forEach(function(c){var b=document.createElement('button');b.className='chip'+(c[0]==='all'?' on':'');b.textContent=c[1];b.onclick=function(){CUR=c[0];ch.querySelectorAll('.chip').forEach(function(x){x.classList.remove('on');});b.classList.add('on');render();};ch.appendChild(b);});
document.getElementById('q').addEventListener('input',render);
document.getElementById('bd').addEventListener('click',function(ev){var b=ev.target.closest('.ovt');if(!b)return;var c=document.getElementById('c-'+b.getAttribute('data-jump'));if(!c)return;c.scrollIntoView({behavior:'smooth',block:'start'});c.classList.add('flash');setTimeout(function(){c.classList.remove('flash');},1600);});
render();
setInterval(function(){var t=jnow();if(window._lastD!==t){window._lastD=t;render();}},60000);
</script>
</body>
