}
function period(e){
 if(!e.start&&!e.end)return '期間の定めなし（終了通知が出るまで継続）';
 var a=e.start?fmtdy(e.start):'', b=e.end?fmtdy(e.end):'当分の間（通年）';
 return '期間 '+a+' 〜 '+b;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function card(e,st){
 var h='<div class="card'+(st.k==='fin'?' end':'')+'" data-cat="'+e.cat+'" data-st="'+st.k+'">';
 h+='<div class="tt"><span class="cat '+e.cat+'">'+CATN[e.cat]+'</span><span class="name">'+esc(e.title)+'</span><span class="st '+st.k+'">'+st.t+'</span></div>';
 h+='<div class="per">'+esc(period(e))+'</div>';
 if(st.k!=='fin'){
  h+='<div class="gd">';
  h+='<div class="gi"><div class="k">取扱・場所</div><div class="v">'+esc(e.place||'—')+'</div></div>';
  h+='<div class="gi"><div class="k">金額</div><div class="v">'+esc(e.price||'—')+'</div></div>';
  h+='<div class="gi"><div class="k">内容・方法</div><div class="v">'+esc(e.how||'—')+'</div></div>';
  h+='</div>';
  if(e.points&&e.points.length){h+='<ul class="pt">';e.points.forEach(function(p){h+='<li>'+esc(p)+'</li>';});h+='</ul>';}
  if(e.cautions&&e.cautions.length){h+='<div class="cau">';e.cautions.forEach(function(c){h+='<div>'+esc(c)+'</div>';});h+='</div>';}
  if(e.details&&e.details.length){h+='<details><summary>詳細を開く</summary><table class="dtb">';e.details.forEach(function(r){h+='<tr><td>'+esc(r[0])+'</td><td>'+esc(r[1])+'</td></tr>';});h+='</table></details>';}
  if(e.pending_note)h+='<div class="endnote">'+esc(e.pending_note)+'</div>';
 }else{
  var mini=[];if(e.price&&e.price!=='—')mini.push(e.price);if(e.place)mini.push(e.place);
  h+='<details><summary>終了時の内容を見る</summary><table class="dtb">';
  [['取扱・場所',e.place],['金額',e.price],['内容',e.how]].forEach(function(r){if(r[1]&&r[1]!=='—')h+='<tr><td>'+esc(r[0])+'</td><td>'+esc(r[1])+'</td></tr>';});
  (e.cautions||[]).forEach(function(c){h+='<tr><td>注意</td><td>'+esc(c)+'</td></tr>';});
  h+='</table></details>';
  if(e.ended_note)h+='<div class="endnote">▶ '+esc(e.ended_note)+'</div>';
 }
 if(e.sources&&e.sources.length)h+='<details class="src"><summary style="color:#9a9aa5">出典（社内資料）</summary>'+e.sources.map(esc).join('<br>')+'</details>';
 h+='</div>';
 return h;
}
var CUR='all';
function render(){
 var today=jnow();document.getElementById('today').textContent=fmtdy(today);
 var q=(document.getElementById('q').value||'').trim().toLowerCase();
 var act=[],fin=[];
 EV.forEach(function(e){
  if(CUR!=='all'&&CUR!=='fin'&&e.cat!==CUR)return;
  if(q){var blob=(e.title+' '+(e.place||'')+' '+(e.price||'')+' '+(e.how||'')+' '+(e.points||[]).join(' ')+' '+(e.cautions||[]).join(' ')).toLowerCase();if(blob.indexOf(q)<0)return;}
  var st=stOf(e,today);
  if(st.k==='fin')fin.push([e,st]);else act.push([e,st]);
 });
 act.sort(function(a,b){var ea=a[0].end||'9999',eb=b[0].end||'9999';if(ea!==eb)return ea<eb?-1:1;return (a[0].start||'')<(b[0].start||'')?-1:1;});
 fin.sort(function(a,b){var ea=a[0].end||'',eb=b[0].end||'';return ea>eb?-1:1;});
 var h='';
 if(CUR!=='fin'){
  h+='<div class="sec">進行中・発売中（'+act.length+'件・終了が近い順）</div>';
  if(!act.length)h+='<div id="none">該当なし</div>';
  act.forEach(function(x){h+=card(x[0],x[1]);});
 }
 if(fin.length&&(CUR==='all'||CUR==='fin')){
  h+='<div class="sec">終了済み（'+fin.length+'件・履歴）</div>';
  fin.forEach(function(x){h+=card(x[0],x[1]);});
 }else if(CUR==='fin'&&!fin.length){h+='<div id="none">該当なし</div>';}
 document.getElementById('bd').innerHTML=h;
}
var chips=[['all','すべて'],['event','イベント'],['ticket','きっぷ'],['goods','グッズ'],['joho','常設'],['fin','終了済み']];
var ch=document.getElementById('chips');
chips.forEach(function(c){var b=document.createElement('button');b.className='chip'+(c[0]==='all'?' on':'');b.textContent=c[1];b.onclick=function(){CUR=c[0];ch.querySelectorAll('.chip').forEach(function(x){x.classList.remove('on');});b.classList.add('on');render();};ch.appendChild(b);});
document.getElementById('q').addEventListener('input',render);
render();
setInterval(function(){var t=jnow();if(window._lastD!==t){window._lastD=t;render();}},60000);
</script>
</body>
</html>
